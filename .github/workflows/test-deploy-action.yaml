name: Unit Tests - Deploy Action (Verify Astro CLI step)

on:
  push:
  workflow_dispatch:

# Tests for the "Verify Astro CLI" step of deploy-action, run in isolation.
# No Astro API credentials required; all jobs use a fake astro binary.

jobs:

  # 1. ASTRO_CLI_PATH set to a valid binary → verify passes
  test-astro-cli-path-valid:
    name: "ASTRO_CLI_PATH: valid binary → verify passes"
    runs-on: ubuntu-latest
    env:
      ASTRO_CLI_PATH: /tmp/test-bin/astro
    steps:
      - uses: actions/checkout@v4

      - name: Create fake astro binary (pre-executable, as expected)
        run: |
          mkdir -p /tmp/test-bin
          printf '#!/bin/bash\necho "Astro CLI Version: 1.99.0"\n' > /tmp/test-bin/astro
          chmod +x /tmp/test-bin/astro

      - name: Run Verify Astro CLI logic
        run: |
          if [[ -n "${ASTRO_CLI_PATH}" ]]; then
            if [[ ! -f "${ASTRO_CLI_PATH}" ]]; then
              echo "ERROR: ASTRO_CLI_PATH is set to '${ASTRO_CLI_PATH}' but the file does not exist."
              exit 1
            fi
            mkdir -p "${HOME}/.local/bin"
            ln -sf "${ASTRO_CLI_PATH}" "${HOME}/.local/bin/astro"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
            export PATH="${HOME}/.local/bin:${PATH}"
          fi
          if ! command -v astro &> /dev/null; then
            echo "ERROR: Astro CLI is not installed or not in PATH."
            exit 1
          fi
          echo "PASS: astro found at $(which astro)"
          test -L "${HOME}/.local/bin/astro"
          test "$(readlink "${HOME}/.local/bin/astro")" = "${ASTRO_CLI_PATH}"
          echo "PASS: symlink ${HOME}/.local/bin/astro → ${ASTRO_CLI_PATH}"

  # 2. ASTRO_CLI_PATH set to a missing file → must fail
  test-astro-cli-path-missing:
    name: "ASTRO_CLI_PATH: missing file → must exit non-zero"
    runs-on: ubuntu-latest
    env:
      ASTRO_CLI_PATH: /tmp/does-not-exist/astro
    steps:
      - uses: actions/checkout@v4

      - name: Run Verify Astro CLI logic (expect failure)
        id: verify
        continue-on-error: true
        run: |
          if [[ -n "${ASTRO_CLI_PATH}" ]]; then
            if [[ ! -f "${ASTRO_CLI_PATH}" ]]; then
              echo "ERROR: ASTRO_CLI_PATH is set to '${ASTRO_CLI_PATH}' but the file does not exist."
              exit 1
            fi
          fi

      - name: Assert step failed
        run: |
          if [[ "${{ steps.verify.outcome }}" != "failure" ]]; then
            echo "ERROR: expected verify step to fail for missing ASTRO_CLI_PATH, but it succeeded"
            exit 1
          fi
          echo "PASS: verify step correctly failed for missing ASTRO_CLI_PATH"

  # 3. astro already in PATH → verify passes
  test-astro-in-path:
    name: "astro in PATH: verify passes"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Place fake astro binary in PATH
        run: |
          mkdir -p /tmp/test-bin
          printf '#!/bin/bash\necho "Astro CLI Version: 1.99.0"\n' > /tmp/test-bin/astro
          chmod +x /tmp/test-bin/astro
          echo /tmp/test-bin >> "$GITHUB_PATH"

      - name: Run Verify Astro CLI logic
        run: |
          if ! command -v astro &> /dev/null; then
            echo "ERROR: Astro CLI is not installed or not in PATH."
            exit 1
          fi
          echo "PASS: astro found at $(which astro)"

  # 4. astro not in PATH and ASTRO_CLI_PATH not set → must fail
  test-astro-not-found:
    name: "astro not found → must exit non-zero"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Verify Astro CLI logic (expect failure)
        id: verify
        continue-on-error: true
        env:
          # Use a minimal PATH to guarantee astro is not found, even on local runners
          PATH: /usr/bin:/bin:/usr/sbin:/sbin
        run: |
          if ! command -v astro &> /dev/null; then
            echo "ERROR: Astro CLI is not installed or not in PATH."
            exit 1
          fi

      - name: Assert step failed
        run: |
          if [[ "${{ steps.verify.outcome }}" != "failure" ]]; then
            echo "ERROR: expected verify step to fail when astro is not in PATH, but it succeeded"
            exit 1
          fi
          echo "PASS: verify step correctly failed when astro is not in PATH"

  # 5. deploy-type: dbt with CLI < 1.28.1 → must fail
  test-dbt-old-cli-version:
    name: "dbt deploy with CLI < 1.28.1 → must exit non-zero"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run version check logic for dbt (expect failure)
        id: verify
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-bin-dbt
          printf '#!/bin/bash\necho "Astro CLI Version: 1.28.0"\n' > /tmp/test-bin-dbt/astro
          chmod +x /tmp/test-bin-dbt/astro
          export PATH="/tmp/test-bin-dbt:${PATH}"

          if ! command -v semver &> /dev/null; then
            npm install -g semver
          fi
          CLI_VERSION=$(astro version | awk '{print $4}')
          REQUIRED_VERSION="1.28.1"
          if ! semver -r ">${REQUIRED_VERSION}" "${CLI_VERSION}"; then
            echo "ERROR: DBT Deploy requires Astro CLI version greater than ${REQUIRED_VERSION}, found ${CLI_VERSION}"
            exit 1
          fi

      - name: Assert step failed
        run: |
          if [[ "${{ steps.verify.outcome }}" != "failure" ]]; then
            echo "ERROR: expected version check to fail for dbt with CLI 1.28.0, but it succeeded"
            exit 1
          fi
          echo "PASS: version check correctly failed for dbt deploy with CLI 1.28.0"

  # 6. wait-time set with CLI < 1.38.0 → must fail
  test-wait-time-old-cli-version:
    name: "wait-time with CLI < 1.38.0 → must exit non-zero"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run version check logic for wait-time (expect failure)
        id: verify
        continue-on-error: true
        env:
          INPUT_WAIT_TIME: "300s"
        run: |
          mkdir -p /tmp/test-bin-wait
          printf '#!/bin/bash\necho "Astro CLI Version: 1.37.9"\n' > /tmp/test-bin-wait/astro
          chmod +x /tmp/test-bin-wait/astro
          export PATH="/tmp/test-bin-wait:${PATH}"

          if ! command -v semver &> /dev/null; then
            npm install -g semver
          fi
          CLI_VERSION=$(astro version | awk '{print $4}')
          REQUIRED_VERSION="1.38.0"
          if ! semver -r ">=${REQUIRED_VERSION}" "${CLI_VERSION}"; then
            echo "ERROR: wait-time option requires Astro CLI version ${REQUIRED_VERSION} or higher, found ${CLI_VERSION}"
            exit 1
          fi

      - name: Assert step failed
        run: |
          if [[ "${{ steps.verify.outcome }}" != "failure" ]]; then
            echo "ERROR: expected version check to fail for wait-time with CLI 1.37.9, but it succeeded"
            exit 1
          fi
          echo "PASS: version check correctly failed for wait-time with CLI 1.37.9"
